<h2>What is DNS?</h2>

<p>
DNS (Domain Name System) converts website names
into IP addresses.
</p>


<h2>Example</h2>

<pre>
google.com
      ↓
142.250.x.x
</pre>


<h2>Why DNS is Important?</h2>

<ul>
<li>Makes websites easy to access</li>
<li>Finds correct server</li>
<li>Manages domain names</li>
</ul>
